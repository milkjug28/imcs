        * {

            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Comic Neue', cursive;
            overflow: hidden;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><circle cx="10" cy="10" r="8" fill="%23ff00ff"/></svg>'), auto;

        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            overflow: hidden;
        }
        
        #splash.hidden {
            display: none;
        }
        
        #flashlight {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 40%, transparent 70%);
            pointer-events: none;
            transition: transform 0.1s ease-out;

        .creepy-eye {

        }
        
        .eye-white {

            width: 120px;
            height: 120px;
            background: #fff;
            border-radius: 50%;

        }
        
        .eye-iris {

            width: 70px;
            height: 70px;
            background: radial-gradient(circle, #ff1493 0%, #8b008b 50%, #000 80%);
            border-radius: 50%;
            top: 50%;
            left: 50%;

        }
        
        .eye-pupil {
            position: absolute;
            width: 35px;
            height: 35px;
            background: #000;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .eye-shine {
            position: absolute;
            width: 15px;
            height: 15px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            top: 30%;
            left: 30%;
        }
        
        #left-eye {

            top: 45%;
        }
        
        #right-eye {

        }
        
        #enter-btn {

            border: 4px solid #fff;

            transform: rotate(-2deg);

            transition: all 0.1s;
            position: absolute;
            bottom: 80px;
            z-index: 10;

        }
        
        @keyframes pulse {

        }
        
        #enter-btn:hover {

            box-shadow: 0 0 30px rgba(0,255,0,0.9), 5px 5px 0 #fff;
        }
        
        #main-site {

            height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8E8 100%);
            display: none;
            flex-direction: column;
        }
        
        #main-site.active {
            display: flex;
        }
        
        header {
            background: linear-gradient(90deg, #ff6b9d, #ffd700, #00ff00, #00bfff, #ff00ff);
            padding: 20px;
            text-align: center;
            border-bottom: 5px dashed #000;
        }

        nav {

        .page.active {

        /* Gallery page needs to contain its overlay */

        .particle {

        .marquee-content {

            100% { transform: translateX(-100%); }
        }

        .floating-emoji {

        @keyframes float-around {

        @keyframes drift {

        /* Locked page overlay */

            pointer-events: none;
        }
    </style>

    <script>
        const effects = [
            { emoji: '🌈' }, { emoji: '⭐' }, { emoji: '✨' }, { emoji: '💫' },
            { emoji: '🎆' }, { emoji: '🎨' }, { emoji: '🦄' }, { emoji: '🎪' },
            { emoji: '🎭' }, { emoji: '🌟' }
        ];
        
        const splashEmojis = ['⭐', '✨', '💫', '🌟', '✦', '★', '☆'];
        
        // Create floating emojis on splash page
        function createSplashEmoji() {
            const container = document.getElementById('splash-emojis');
            if (!container || document.getElementById('splash').classList.contains('hidden')) return;
            
            const emoji = document.createElement('div');
            emoji.className = 'splash-emoji';
            emoji.textContent = splashEmojis[Math.floor(Math.random() * splashEmojis.length)];
            emoji.style.left = Math.random() * 100 + 'vw';
            emoji.style.fontSize = (Math.random() * 30 + 20) + 'px';
            emoji.style.animation = `drift ${Math.random() * 8 + 8}s linear forwards`;
            
            container.appendChild(emoji);
            
            // Remove after animation
            setTimeout(() => emoji.remove(), 16000);
        }
        
        // Spawn emojis continuously on splash
        setInterval(createSplashEmoji, 800);
        // Create initial batch
        for (let i = 0; i < 10; i++) {
            setTimeout(createSplashEmoji, i * 200);
        }
        
        // Splash screen
        const flashlight = document.getElementById('flashlight');
        const leftEye = document.querySelector('#left-eye .eye-iris');
        const rightEye = document.querySelector('#right-eye .eye-iris');
        const splash = document.getElementById('splash');
        
        splash.addEventListener('mousemove', (e) => {
            flashlight.style.left = e.clientX - 150 + 'px';
            flashlight.style.top = e.clientY - 150 + 'px';
            
            const leftEyeRect = document.getElementById('left-eye').getBoundingClientRect();
            const rightEyeRect = document.getElementById('right-eye').getBoundingClientRect();
            
            const leftEyeCenterX = leftEyeRect.left + leftEyeRect.width / 2;
            const leftEyeCenterY = leftEyeRect.top + leftEyeRect.height / 2;
            const rightEyeCenterX = rightEyeRect.left + rightEyeRect.width / 2;
            const rightEyeCenterY = rightEyeRect.top + rightEyeRect.height / 2;
            
            const leftAngle = Math.atan2(e.clientY - leftEyeCenterY, e.clientX - leftEyeCenterX);
            const leftDistance = Math.min(15, Math.hypot(e.clientX - leftEyeCenterX, e.clientY - leftEyeCenterY) / 20);
            const leftX = Math.cos(leftAngle) * leftDistance;
            const leftY = Math.sin(leftAngle) * leftDistance;
            
            const rightAngle = Math.atan2(e.clientY - rightEyeCenterY, e.clientX - rightEyeCenterX);
            const rightDistance = Math.min(15, Math.hypot(e.clientX - rightEyeCenterX, e.clientY - rightEyeCenterY) / 20);
            const rightX = Math.cos(rightAngle) * rightDistance;
            const rightY = Math.sin(rightAngle) * rightDistance;
            
            leftEye.style.transform = `translate(calc(-50% + ${leftX}px), calc(-50% + ${leftY}px))`;
            rightEye.style.transform = `translate(calc(-50% + ${rightX}px), calc(-50% + ${rightY}px))`;
        });
        
        document.getElementById('enter-btn').addEventListener('click', () => {
            document.getElementById('splash').classList.add('hidden');
            document.getElementById('main-site').classList.add('active');
            
            // Try to play audio (requires user interaction first)
            const audio = document.getElementById('site-audio');
            if (audio.querySelector('source')) {
                audio.play().catch(e => console.log('Audio play blocked:', e));
            }
        });
        
        // Navigation with draggable buttons
        let draggedButton = null;
        let offsetX, offsetY;
        let isDragging = false;
        let startX, startY;
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            // Mouse down - prepare to drag
            btn.addEventListener('mousedown', (e) => {
                draggedButton = btn;
                isDragging = false;
                startX = e.clientX;
                startY = e.clientY;
                
                const rect = btn.getBoundingClientRect();
                const navRect = btn.parentElement.getBoundingClientRect();
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;
                
                e.preventDefault();
                e.stopPropagation();
            });
        });
        
        // Mouse move - drag button
        document.addEventListener('mousemove', (e) => {
            if (draggedButton) {
                const moveDistance = Math.abs(e.clientX - startX) + Math.abs(e.clientY - startY);
                
                if (moveDistance > 5) {
                    isDragging = true;
                    draggedButton.classList.add('dragging');
                }
                
                if (isDragging) {
                    const nav = draggedButton.parentElement;
                    const navRect = nav.getBoundingClientRect();
                    
                    let newLeft = e.clientX - navRect.left - offsetX;
                    let newTop = e.clientY - navRect.top - offsetY;
                    
                    newLeft = Math.max(0, Math.min(newLeft, navRect.width - draggedButton.offsetWidth));
                    newTop = Math.max(0, Math.min(newTop, navRect.height - draggedButton.offsetHeight));
                    
                    draggedButton.style.left = newLeft + 'px';
                    draggedButton.style.top = newTop + 'px';
                }
            }
        });
        
        // Mouse up - stop drag or navigate
        document.addEventListener('mouseup', (e) => {
            if (draggedButton) {
                draggedButton.classList.remove('dragging');
                
                if (!isDragging) {
                    // It was a click, not a drag - navigate
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    draggedButton.classList.add('active');
                    
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                    document.getElementById(draggedButton.dataset.page).classList.add('active');
                }
                
                draggedButton = null;
                isDragging = false;
            }
        });
        
        // Click effects
        document.getElementById('content').addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
            
            const effect = effects[Math.floor(Math.random() * effects.length)];
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.textContent = effect.emoji;
            particle.style.left = e.clientX + 'px';
            particle.style.top = e.clientY + 'px';
            particle.style.fontSize = (Math.random() * 40 + 30) + 'px';
            particle.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
            particle.style.setProperty('--ty', (Math.random() - 0.5) * 200 + 'px');
            
            document.getElementById('content').appendChild(particle);
            setTimeout(() => particle.remove(), 2000);
        });
        
        // Form submission with Twitter intent
        function submitSavant() {
            const name = document.getElementById('name-input').value;
            const info = document.getElementById('info-input').value;
            const wallet = document.getElementById('wallet-input').value;
            
            if (!name || !info || !wallet) {
                alert('pls fill out ALL fieldz! 🌟');
                return;
            }
            
            const tweetText = encodeURIComponent('i ar a savant @imcsnft');
            const twitterUrl = `https://twitter.com/intent/tweet?text=${tweetText}`;
            
            window.open(twitterUrl, '_blank');
            
            document.getElementById('name-input').value = '';
            document.getElementById('info-input').value = '';
            document.getElementById('wallet-input').value = '';
            
            alert('u ar now a savant! 🎉 pls tweet ur status!');
        }
    </script>
</body>
