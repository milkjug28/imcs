<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMCS - Imaginary Magic Crypto Savants</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght:700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Comic Neue', cursive;
            overflow-x: hidden;
            overflow-y: auto;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><circle cx="10" cy="10" r="8" fill="%23ff00ff"/></svg>'), auto;
        }
        
        /* Noise overlay - covers entire site */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('assets/noise.png') repeat;
            pointer-events: none;
            z-index: 99999;
            opacity: 0.15;
        }
        
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            overflow: hidden;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><circle cx="10" cy="10" r="8" fill="%23ff00ff"/></svg>'), auto;
        }
        
        #splash.hidden {
            display: none;
        }
        
        #flashlight {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 40%, transparent 70%);
            pointer-events: none;
            transition: transform 0.1s ease-out;
            z-index: 100;
        }
        
        /* Custom Eye System - All images same size, stack perfectly */
        .eyes-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(calc(-50% - 10px), calc(-50% - 50px));
            pointer-events: none;
            z-index: 10;
        }
        
        /* First layer is relative to establish size */
        .eye-layer-base {
            display: block;
            max-width: 90vw;
            max-height: 80vh;
            width: auto;
            height: auto;
        }
        
        /* All other eye layers - absolute, stacked on top */
        .eye-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        /* Layer 1: Eye whites (bottom) */
        .eye-white-left, .eye-white-right {
            z-index: 1;
        }
        
        /* Layer 2: Eye iris (moves with cursor) */
        .eye-iris-left, .eye-iris-right {
            z-index: 2;
            transition: transform 0.15s ease-out;
        }
        
        /* Layer 3: Skin layer */
        .eye-skin {
            z-index: 3;
        }
        
        /* Layer 4: Face outline (very top) */
        .eye-outline {
            z-index: 4;
        }
        
        /* Focused oval vignette - tight to center */
        .skin-vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse 40% 25% at 50% 45%, transparent 0%, (0,0,0,0.5) 100%);
            z-index: 5;
            pointer-events: none;
        }
        
        #enter-btn {
            font-family: 'Comic Neue', cursive;
            font-size: 28px;
            padding: 15px 40px;
            background: #ffff00;
            border: 4px solid #fff;
            cursor: pointer;
            transform: rotate(-2deg);
            box-shadow: 0 0 20px rgba(255,255,0,0.8), 5px 5px 0 #fff;
            transition: all 0.1s;
            position: absolute;
            bottom: 80px;
            z-index: 10;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: rotate(-2deg) scale(1); }
            50% { transform: rotate(2deg) scale(1.05); }
        }
        
        #enter-btn:hover {
            transform: rotate(2deg) scale(1.15);
            background: #00ff00;
            box-shadow: 0 0 30px rgba(0,255,0,0.9), 5px 5px 0 #fff;
        }
        
        #main-site {
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8E8 100%);
            display: none;
            flex-direction: column;
            overflow-x: hidden;
        }
        
        #main-site.active {
            display: flex;
        }
        
        header {
            background: linear-gradient(90deg, #ff6b9d, #ffd700, #00ff00, #00bfff, #ff00ff);
            padding: 20px;
            text-align: center;
            border-bottom: 5px dashed #000;
        }
        
        h1 {
            font-size: 48px;
            color: #fff;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            letter-spacing: 3px;
            transform: rotate(-1deg);
        }
        
        nav {
            background: #ff00ff;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            border-bottom: 5px solid #000;
            position: relative;
            min-height: 80px;
        }
        
        .nav-btn {
            font-family: 'Comic Neue', cursive;
            font-size: 20px;
            padding: 10px 20px;
            background: #ffff00;
            border: 3px solid #000;
            cursor: move;
            transform: rotate(-1deg);
            box-shadow: 3px 3px 0 #000;
            transition: background 0.1s;
            position: absolute;
            user-select: none;
            white-space: nowrap;
        }
        
        .nav-btn:hover {
            background: #00ff00;
        }
        
        .nav-btn.active {
            background: #ff6b9d;
        }
        
        .nav-btn.dragging {
            opacity: 0.5;
            z-index: 1000;
        }
        
        #content {
            flex: 1;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .page {
            display: none;
            padding: 20px;
            height: 100%;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .page.active {
            display: block;
        }
        
        /* Gallery page needs to contain its overlay */
        #gallery {
            position: relative;
        }
        
        /* Home page has floating emojis */
        #home {
            overflow: hidden;
        }
        
        /* List page needs scroll */
        #list {
            overflow-y: auto;
        }
        
        /* Imagination page needs flex display and hidden overflow for emojis */
        #soon {
            overflow: hidden;
        }
        
        #soon.active {
            display: flex;
        }
        
        .particle {
            position: absolute;
            pointer-events: none;
            animation: float-away 2s ease-out forwards;
            z-index: 10;
        }
        
        @keyframes float-away {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(2) rotate(360deg);
            }
        }
        
        .marquee {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(255, 255, 0, 0.8);
            border-top: 3px solid #000;
            padding: 10px;
            font-size: 24px;
            overflow: hidden;
        }
        
        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: scroll 15s linear infinite;
        }
        
        @keyframes scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        
        /* Gallery Styles */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .gallery-item {
            background: #fff;
            border: 5px solid #000;
            padding: 10px;
            box-shadow: 5px 5px 0 #000;
            transform: rotate(-2deg);
            transition: all 0.2s;
        }
        
        .gallery-item:hover {
            transform: rotate(2deg) scale(1.05);
        }
        
        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border: 3px solid #000;
        }
        
        .gallery-title {
            text-align: center;
            font-size: 48px;
            color: #ff00ff;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 30px;
            transform: rotate(-1deg);
        }
        
        /* List Form Styles */
        .form-container {
            max-width: 600px;
            margin: 50px auto;
            background: linear-gradient(135deg, #ff6b9d, #ffd700);
            border: 5px solid #000;
            padding: 30px;
            box-shadow: 10px 10px 0 #000;
            transform: rotate(-1deg);
            position: relative;
            z-index: 50;
        }
        
        .form-title {
            font-size: 36px;
            color: #fff;
            text-shadow: 3px 3px 0 #000;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 24px;
            color: #000;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            font-family: 'Comic Neue', cursive;
            font-size: 18px;
            border: 3px solid #000;
            background: #fff;
        }
        
        .submit-btn {
            width: 100%;
            font-family: 'Comic Neue', cursive;
            font-size: 28px;
            padding: 15px;
            background: #00ff00;
            border: 4px solid #000;
            cursor: pointer;
            box-shadow: 5px 5px 0 #000;
            transition: all 0.1s;
        }
        
        .submit-btn:hover {
            transform: scale(1.05);
            background: #ffff00;
        }
        
        /* 🍯 Honeypot - invisible to humans */
        .hp-field {
            position: absolute;
            left: -9999px;
            top: -9999px;
            opacity: 0;
            height: 0;
            width: 0;
            overflow: hidden;
            pointer-events: none;
        }
        
        /* Coming Soon Page - don't set display here, let .page handle it */
        .imagination-page {
            background: linear-gradient(45deg, #ff6b9d, #ffd700, #00ff00, #00bfff, #ff00ff, #ff6b9d);
            background-size: 400% 400%;
            animation: rainbow-bg 5s ease infinite;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        
        @keyframes rainbow-bg {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .imagination-title {
            font-size: 120px;
            color: #fff;
            text-shadow: 5px 5px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            animation: bounce 2s infinite;
            margin-bottom: 50px;
            text-align: center;
            width: 100%;
        }
        
        @media (max-width: 768px) {
            .imagination-title {
                font-size: 60px;
            }
            
            h1 {
                font-size: 32px;
                letter-spacing: 2px;
            }
            
            header {
                padding: 15px 10px;
            }
            
            nav {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
                padding: 10px;
                min-height: auto;
            }
            
            .nav-btn {
                position: relative !important;
                left: auto !important;
                top: auto !important;
                width: 100%;
                font-size: 16px;
                padding: 12px 15px;
                text-align: center;
            }
            
            .marquee {
                font-size: 16px;
                padding: 8px;
            }
            
            .gallery-title {
                font-size: 32px;
            }
            
            .form-container {
                margin: 20px auto;
                padding: 20px;
                max-width: calc(100% - 20px);
            }
            
            .form-title {
                font-size: 28px;
            }
            
            .form-group label {
                font-size: 18px;
            }
            
            .form-group input {
                font-size: 16px;
            }
            
            .submit-btn {
                font-size: 20px;
                padding: 12px;
            }
            
            .page {
                padding: 15px 10px;
            }
            
            .locked-text {
                font-size: 32px;
            }
            
            .locked-subtext {
                font-size: 18px;
            }
            
            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 15px;
                padding: 15px 10px;
            }
            
            .gallery-item {
                transform: rotate(-1deg);
            }
            
            .floating-emoji {
                font-size: 40px;
            }
            
            #enter-btn {
                font-size: 20px;
                padding: 12px 30px;
                bottom: 60px;
            }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }
        
        .floating-emoji {
            position: absolute;
            font-size: 60px;
            animation: float-around 10s infinite;
            opacity: 0.8;
        }
        
        @keyframes float-around {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(100px, -100px) rotate(90deg); }
            50% { transform: translate(0, -200px) rotate(180deg); }
            75% { transform: translate(-100px, -100px) rotate(270deg); }
        }
        
        /* Splash page floating emojis */
        .splash-emoji {
            position: absolute;
            font-size: 40px;
            opacity: 0.6;
            pointer-events: none;
            z-index: 5;
        }
        
        @keyframes drift {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        
        /* Locked page overlay */
        .locked-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        #gallery.active .locked-overlay {
            display: flex;
        }
        
        .locked-text {
            font-size: 48px;
            color: #ff00ff;
            text-shadow: 3px 3px 0 #000;
            text-align: center;
            animation: shake 0.5s infinite;
        }
        
        .locked-subtext {
            font-size: 24px;
            color: #ffff00;
            margin-top: 20px;
            text-shadow: 2px 2px 0 #000;
        }
        
        @keyframes shake {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }
        
        /* Popup Gremlin Character - JS controlled positioning */
        .popup-gremlin {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            display: none;
            transition: none;
        }
        
        .popup-gremlin.visible {
            opacity: 1;
        }
        
        .popup-gremlin img {
            display: block;
        }
        
    </style>
</head>

        <div class="marquee">
            <div class="marquee-content">
                ✨ walcum to imcs magic ralm! cliq for surprises anywar! we pramis to onli tek ur mani ✨
            </div>
        </div>
    </div>
    
    <!-- Popup Gremlin -->
    <div id="popup-gremlin" class="popup-gremlin">
        <img alt="surprise!" id="gremlin-img">
    </div>
    
    
    <!-- Gremlin Sound Effects -->
    <audio id="gremlin-sound" preload="auto"></audio>
    
    <script>
        const effects = [
            { emoji: '🌈' }, { emoji: '⭐' }, { emoji: '✨' }, { emoji: '💫' },
            { emoji: '🎆' }, { emoji: '🎨' }, { emoji: '🦄' }, { emoji: '🎪' },
            { emoji: '🎭' }, { emoji: '🌟' }
        ];
        
        const splashEmojis = ['⭐', '✨', '💫', '🌟', '✦', '★', '☆'];
        
        // Create floating emojis on splash page
        function createSplashEmoji() {
            const container = document.getElementById('splash-emojis');
            if (!container || document.getElementById('splash').classList.contains('hidden')) return;
            
            const emoji = document.createElement('div');
            emoji.className = 'splash-emoji';
            emoji.textContent = splashEmojis[Math.floor(Math.random() * splashEmojis.length)];
            emoji.style.left = Math.random() * 100 + 'vw';
            emoji.style.fontSize = (Math.random() * 30 + 20) + 'px';
            emoji.style.animation = `drift ${Math.random() * 8 + 8}s linear forwards`;
            
            container.appendChild(emoji);
            
            // Remove after animation
            setTimeout(() => emoji.remove(), 16000);
        }
        
        // Spawn emojis continuously on splash
        setInterval(createSplashEmoji, 800);
        // Create initial batch
        for (let i = 0; i < 10; i++) {
            setTimeout(createSplashEmoji, i * 200);
        }
        
        // Splash screen - Eye tracking
        const flashlight = document.getElementById('flashlight');
        const irisLeft = document.getElementById('iris-left');
        const irisRight = document.getElementById('iris-right');
        const eyesWrapper = document.querySelector('.eyes-wrapper');
        const splash = document.getElementById('splash');
        
        splash.addEventListener('mousemove', (e) => {
            // Flashlight follows cursor
            flashlight.style.left = e.clientX - 150 + 'px';
            flashlight.style.top = e.clientY - 150 + 'px';
            
            // Get wrapper center as reference
            const wrapperRect = eyesWrapper.getBoundingClientRect();
            const centerX = wrapperRect.left + wrapperRect.width / 2;
            const centerY = wrapperRect.top + wrapperRect.height / 2;
            
            // Adjust these values:
            // - MAX_MOVEMENT: max pixels iris can move
            // - SENSITIVITY: lower = more responsive
            const MAX_MOVEMENT = 8;
            const SENSITIVITY = 30;
            
            // Calculate direction and distance to cursor
            const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
            const distance = Math.min(MAX_MOVEMENT, Math.hypot(e.clientX - centerX, e.clientY - centerY) / SENSITIVITY);
            const moveX = Math.cos(angle) * distance;
            const moveY = Math.sin(angle) * distance;
            
            // Both irises move together (same direction)
            irisLeft.style.transform = `translate(${moveX}px, ${moveY}px)`;
            irisRight.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
        
        document.getElementById('enter-btn').addEventListener('click', () => {
            document.getElementById('splash').classList.add('hidden');
            document.getElementById('main-site').classList.add('active');
            
            // Start randomized music playlist
            startMusicPlaylist();
            
            // Start the gremlin popup madness!
            startGremlinPopups();
        });
        
        // ========================================
        // POPUP GREMLIN SYSTEM
        // ========================================
        // ========================================
        // SAVANT POPUP SYSTEM
        // ========================================
        const savantCharacters = [
            'assets/character/savant-dopey.png',
            'assets/character/savant-mask.png',
            'assets/character/savant-pepe.png',
            'assets/character/savant-smoke.png'
        ];
        const savantSounds = [
            'assets/audio/fart2.mp3'
        ];
        const savantSizes = [120, 150, 180, 200];
        const savantEdges = ['bottom', 'top', 'left', 'right'];
        let savantInterval = null;
        let savantAnimating = false;
        
        function showSavant() {
            if (savantAnimating) return;
            savantAnimating = true;
            
            const gremlin = document.getElementById('popup-gremlin');
            const gremlinImg = document.getElementById('gremlin-img');
            const gremlinSound = document.getElementById('gremlin-sound');
            
            // Pick random character, edge, and size
            const character = savantCharacters[Math.floor(Math.random() * savantCharacters.length)];
            const edge = savantEdges[Math.floor(Math.random() * savantEdges.length)];
            const size = savantSizes[Math.floor(Math.random() * savantSizes.length)];
            
            // Set character image and size
            gremlinImg.src = character;
            gremlinImg.style.width = size + 'px';
            gremlinImg.style.height = 'auto';
            
            const stayTime = 1000 + Math.random() * 2000; // 1-3 seconds
            
            // Reset all styles
            gremlin.style.display = 'block';
            gremlin.style.opacity = '1';
            gremlin.style.transition = 'none';
            gremlin.style.top = '';
            gremlin.style.bottom = '';
            gremlin.style.left = '';
            gremlin.style.right = '';
            gremlin.style.transform = '';
            
            // Wait for image to load
            gremlinImg.onload = () => {
                const imgHeight = gremlinImg.offsetHeight;
                const imgWidth = gremlinImg.offsetWidth;
                
                if (edge === 'bottom') {
                    // Bottom edge - pop up from below, no rotation
                    const xPos = 10 + Math.random() * 80;
                    gremlin.style.bottom = '0';
                    gremlin.style.left = xPos + '%';
                    gremlin.style.transform = `translateY(${imgHeight}px)`; // Start outside viewport (below)
                    
                    setTimeout(() => {
                        gremlin.style.transition = 'transform 0.3s ease-out';
                        gremlin.style.transform = 'translateY(0)'; // Pop in
                    }, 10);
                    
                    setTimeout(() => {
                        gremlin.style.transition = 'transform 0.3s ease-in';
                        gremlin.style.transform = `translateY(${imgHeight}px)`; // Pop out
                    }, stayTime);
                    
                } else if (edge === 'top') {
                    // Top edge - pop down from above, rotate 180deg (flipped)
                    const xPos = 10 + Math.random() * 80;
                    gremlin.style.top = '0';
                    gremlin.style.left = xPos + '%';
                    gremlin.style.transform = `rotate(180deg) translateY(${imgHeight}px)`; // Start outside viewport (above)
                    
                    setTimeout(() => {
                        gremlin.style.transition = 'transform 0.3s ease-out';
                        gremlin.style.transform = 'rotate(180deg) translateY(0)'; // Pop in
                    }, 10);
                    
                    setTimeout(() => {
                        gremlin.style.transition = 'transform 0.3s ease-in';
                        gremlin.style.transform = `rotate(180deg) translateY(${imgHeight}px)`; // Pop out
                    }, stayTime);
                    
                } else if (edge === 'right') {
                    // Right edge - rotate CCW 90deg (-90deg), slide in from right
                    const yPos = 20 + Math.random() * 60;
                    gremlin.style.right = '0';
                    gremlin.style.top = yPos + '%';
                    gremlin.style.transform = `rotate(-90deg) translateY(${imgWidth}px)`; // Start outside viewport (right)
                    
                    setTimeout(() => {
                        gremlin.style.transition = 'transform 0.3s ease-out';
                        gremlin.style.transform = 'rotate(-90deg) translateY(0)'; // Slide in
                    }, 10);
                    
                    setTimeout(() => {
                        gremlin.style.transition = 'transform 0.3s ease-in';
                        gremlin.style.transform = `rotate(-90deg) translateY(${imgWidth}px)`; // Slide out
                    }, stayTime);
                    
                } else if (edge === 'left') {
                    // Left edge - rotate CW 90deg (90deg), slide in from left
                    const yPos = 20 + Math.random() * 60;
                    gremlin.style.left = '0';
                    gremlin.style.top = yPos + '%';
                    gremlin.style.transform = `rotate(90deg) translateY(-${imgWidth}px)`; // Start outside viewport (left)
                    
                    setTimeout(() => {
                        gremlin.style.transition = 'transform 0.3s ease-out';
                        gremlin.style.transform = 'rotate(90deg) translateY(0)'; // Slide in
                    }, 10);
                    
                    setTimeout(() => {
                        gremlin.style.transition = 'transform 0.3s ease-in';
                        gremlin.style.transform = `rotate(90deg) translateY(-${imgWidth}px)`; // Slide out
                    }, stayTime);
                }
                
                // Cleanup after animation completes
                setTimeout(() => {
                    gremlin.style.display = 'none';
                    gremlin.style.opacity = '0';
                    gremlin.style.transform = '';
                    gremlin.style.transition = '';
                    savantAnimating = false;
                }, stayTime + 400);
            };
            
            // If image already loaded, trigger onload
            if (gremlinImg.complete) {
                gremlinImg.onload();
            }
            
            // Play sound
            const sound = savantSounds[Math.floor(Math.random() * savantSounds.length)];
            gremlinSound.src = sound;
            gremlinSound.volume = 0.5;
            gremlinSound.play().catch(e => console.log('Sound blocked:', e));
        }
        
        function startGremlinPopups() {
            // First popup quickly (0.5-1 second)
            setTimeout(() => {
                showSavant();
                
                // Then every 2-4 seconds
                savantInterval = setInterval(() => {
                    showSavant();
                }, 2000 + Math.random() * 2000);
            }, 500 + Math.random() * 500);
        }
        
        // ========================================
        // MUSIC PLAYLIST - Randomized
        // ========================================
        const musicTracks = [
            'assets/audio/crystalsettings.mp3',
            'assets/audio/DJDave-Airglow(Visualizer).mp3',
            'assets/audio/NoMana,SUPERDARK-HoldMe.mp3',
            'assets/audio/0neo-px.mp3'
        ];
        let shuffledPlaylist = [];
        let currentTrackIndex = 0;
        
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }
        
        function playNextTrack() {
            const audio = document.getElementById('site-audio');
            audio.src = shuffledPlaylist[currentTrackIndex];
            audio.play().catch(e => console.log('Audio play blocked:', e));
            currentTrackIndex = (currentTrackIndex + 1) % shuffledPlaylist.length;
        }
        
        function startMusicPlaylist() {
            const audio = document.getElementById('site-audio');
            
            // Shuffle the playlist
            shuffledPlaylist = shuffleArray(musicTracks);
            currentTrackIndex = 0;
            
            // When a track ends, play the next one
            audio.addEventListener('ended', playNextTrack);
            
            // Start playing
            playNextTrack();
        }
        
        // Navigation with draggable buttons
        let draggedButton = null;
        let offsetX, offsetY;
        let isDragging = false;
        let startX, startY;
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            // Mouse down - prepare to drag
            btn.addEventListener('mousedown', (e) => {
                draggedButton = btn;
                isDragging = false;
                startX = e.clientX;
                startY = e.clientY;
                
                const rect = btn.getBoundingClientRect();
                const navRect = btn.parentElement.getBoundingClientRect();
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;
                
                e.preventDefault();
                e.stopPropagation();
            });
        });
        
        // Mouse move - drag button
        document.addEventListener('mousemove', (e) => {
            if (draggedButton) {
                const moveDistance = Math.abs(e.clientX - startX) + Math.abs(e.clientY - startY);
                
                if (moveDistance > 5) {
                    isDragging = true;
                    draggedButton.classList.add('dragging');
                }
                
                if (isDragging) {
                    const nav = draggedButton.parentElement;
                    const navRect = nav.getBoundingClientRect();
                    
                    let newLeft = e.clientX - navRect.left - offsetX;
                    let newTop = e.clientY - navRect.top - offsetY;
                    
                    newLeft = Math.max(0, Math.min(newLeft, navRect.width - draggedButton.offsetWidth));
                    newTop = Math.max(0, Math.min(newTop, navRect.height - draggedButton.offsetHeight));
                    
                    draggedButton.style.left = newLeft + 'px';
                    draggedButton.style.top = newTop + 'px';
                }
            }
        });
        
        // Mouse up - stop drag or navigate
        let galleryPopupTimeout = null;
        
        document.addEventListener('mouseup', (e) => {
            if (draggedButton) {
                draggedButton.classList.remove('dragging');
                
                if (!isDragging) {
                    // It was a click, not a drag - navigate
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    draggedButton.classList.add('active');
                    
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                    document.getElementById(draggedButton.dataset.page).classList.add('active');
                    
                    // Gallery page - show alert after 7 seconds
                    if (draggedButton.dataset.page === 'gallery') {
                        clearTimeout(galleryPopupTimeout);
                        galleryPopupTimeout = setTimeout(() => {
                            alert('urrhm u need 2 refrassh dummie 🤪');
                        }, 7000);
                    } else {
                        // Clear timeout if navigating away
                        clearTimeout(galleryPopupTimeout);
                    }
                }
                
                draggedButton = null;
                isDragging = false;
            }
        });
        
        // Click effects
        document.getElementById('content').addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
            
            const effect = effects[Math.floor(Math.random() * effects.length)];
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.textContent = effect.emoji;
            particle.style.left = e.clientX + 'px';
            particle.style.top = e.clientY + 'px';
            particle.style.fontSize = (Math.random() * 40 + 30) + 'px';
            particle.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
            particle.style.setProperty('--ty', (Math.random() - 0.5) * 200 + 'px');
            
            document.getElementById('content').appendChild(particle);
            setTimeout(() => particle.remove(), 2000);
        });
        
        // ========================================
        // GOOGLE SHEETS FORM SUBMISSION
        // ========================================
        // IMPORTANT: Replace this URL with your deployed Google Apps Script URL!
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxuEK4HAmEvRJTOKI1pPHydNlxOlf1l8ajnsWyEk5JXjL-PBLYhYGTKkwv3yGB_UOn-4g/exec';
        
        // Check if user already submitted (localStorage)
        function hasAlreadySubmitted() {
            return localStorage.getItem('savant_submitted') === 'true';
        }
        
        // Get user's IP address
        async function getUserIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (e) {
                console.log('Could not get IP:', e);
                return 'unknown';
            }
        }
        
        // Main form submission
        async function submitSavant() {
            const submitBtn = document.querySelector('.submit-btn');
            const name = document.getElementById('name-input').value.trim();
            const info = document.getElementById('info-input').value.trim();
            const wallet = document.getElementById('wallet-input').value.trim();
            const honeypot = document.getElementById('website-input').value;
            
            // 🍯 Honeypot check - if filled, it's a bot!
            if (honeypot) {
                // Pretend it worked so bot thinks it succeeded
                console.log('🍯 Bot detected!');
                alert('ur on da lisssst now! 🎉');
                return;
            }
            
            // Validate fields
            if (!name || !info || !wallet) {
                alert('pls fill out ALL fieldz! 🌟');
                return;
            }
            
            // Check wallet format (basic EVM address check)
            if (!/^0x[a-fA-F0-9]{40}$/.test(wallet)) {
                alert('dat dont look liek a valid wallet addresss!');
                return;
            }
            
            // Check localStorage
            if (hasAlreadySubmitted()) {
                alert('u alredy submitd! 1 per savant plz 🙅');
                return;
            }
            
            // Check if Google Script URL is set
            if (GOOGLE_SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
                alert('dev needs 2 set up da google sheet first!');
                return;
            }
            
            // Disable button while submitting
            submitBtn.disabled = true;
            submitBtn.textContent = 'submittin... ⏳';
            
            try {
                // Get IP for duplicate checking
                const ip = await getUserIP();
                
                // Submit to Google Sheets
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Required for Google Apps Script
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: name,
                        info: info,
                        wallet: wallet,
                        ip: ip
                    })
                });
                
                // Note: no-cors means we can't read the response
                // So we assume success and let the sheet validate
                
                // Save to localStorage
                localStorage.setItem('savant_submitted', 'true');
                localStorage.setItem('savant_wallet', wallet);
                localStorage.setItem('savant_name', name);
                
                // Clear form
                document.getElementById('name-input').value = '';
                document.getElementById('info-input').value = '';
                document.getElementById('wallet-input').value = '';
                
                // Success!
                alert('ur on da lisssst now! 🎉 welcum 2 da savants!');
                
                // Open Twitter intent
                const tweetText = encodeURIComponent('i ar a savant @imcsnft 🧙‍♂️✨');
                const twitterUrl = `https://twitter.com/intent/tweet?text=${tweetText}`;
                window.open(twitterUrl, '_blank');
                
            } catch (error) {
                console.error('Submit error:', error);
                alert('sumthin went wrong! try agen latr 😢');
            } finally {
                // Re-enable button
                submitBtn.disabled = false;
                submitBtn.textContent = 'becum a savant! 🚀';
            }
        }
        
        // On page load, check if already submitted and show message
        if (hasAlreadySubmitted()) {
            const savedName = localStorage.getItem('savant_name');
            console.log('Already submitted as:', savedName);
        }
    </script>
